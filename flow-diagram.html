<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARSYS ARK — User Flow Diagram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;
  --gold:#C8A97E;--gold-l:#E8D5B5;
  --t1:#fff;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.3);--t4:rgba(255,255,255,.12);
  --glass:rgba(255,255,255,.028);--glass-b:rgba(255,255,255,.055);
  --border:rgba(255,255,255,.075);
  --c-main:#C8A97E;--c-auto:#6DB8A8;--c-alt:#8898A8;--c-nav:#9A8AAA;--c-loop:#A8986E;--c-err:#A07272;
}
html,body{background:var(--bg);color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;height:100%;width:100%}

/* ══ TOP NAV ════════════════════════════════ */
.topnav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(5,5,5,.92);border-bottom:0.5px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:200;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:16px}
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;background:var(--glass-b);border:0.5px solid var(--border);border-radius:8px;color:var(--t3);font-size:12px;font-weight:500;text-decoration:none;transition:color .2s,border-color .2s,background .2s;white-space:nowrap}
.back-btn:hover{color:var(--gold);border-color:rgba(200,169,126,.3);background:rgba(200,169,126,.06)}
.back-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-title{font-size:13px;font-weight:600;letter-spacing:.5px;color:var(--t1)}
.nav-sub{font-size:11px;color:var(--t3);font-weight:300;margin-left:4px}
.nav-right{display:flex;align-items:center;gap:8px}

/* ══ ZOOM CONTROLS ══════════════════════════ */
.zoom-controls{display:flex;align-items:center;gap:6px;background:var(--glass-b);border:0.5px solid var(--border);border-radius:10px;padding:5px 8px}
.zoom-btn{width:28px;height:28px;background:transparent;border:none;color:var(--t3);cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:300;transition:background .15s,color .15s;line-height:1;flex-shrink:0}
.zoom-btn:hover{background:rgba(200,169,126,.1);color:var(--gold)}
.zoom-pct{font-size:11px;color:var(--t3);font-weight:500;min-width:38px;text-align:center;font-variant-numeric:tabular-nums}
.fit-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:rgba(200,169,126,.1);border:0.5px solid rgba(200,169,126,.25);border-radius:8px;color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;transition:background .15s,border-color .15s;white-space:nowrap}
.fit-btn:hover{background:rgba(200,169,126,.18);border-color:rgba(200,169,126,.4)}
.fit-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ══ LEGEND ══════════════════════════════════ */
.legend{display:flex;align-items:center;gap:14px;padding:7px 14px;background:rgba(5,5,5,.8);border:0.5px solid var(--border);border-radius:9px}
.l-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t4);font-weight:400;white-space:nowrap}
.l-line{width:20px;height:1.5px;border-radius:1px;flex-shrink:0}
.l-item.main .l-line{background:var(--c-main)}
.l-item.auto .l-line{background:var(--c-auto)}
.l-item.alt .l-line{background:var(--c-alt);opacity:.7}
.l-item.nav .l-line{background:var(--c-nav)}
.l-item.loop .l-line{background:var(--c-loop);opacity:.65}

/* ══ CANVAS VIEWPORT ════════════════════════ */
.viewport{position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
.viewport.grabbing{cursor:grabbing}
.pan-layer{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

/* ══ STAGE HEADERS ═══════════════════════════ */
.stage-header{position:absolute;display:flex;flex-direction:column;align-items:center;pointer-events:none;top:0}
.stage-pill{padding:4px 10px;background:rgba(200,169,126,.07);border:0.5px solid rgba(200,169,126,.14);border-radius:20px}
.stage-name{font-size:8.5px;letter-spacing:2.5px;color:var(--gold);font-weight:600;text-transform:uppercase;white-space:nowrap}
.stage-num{font-size:8px;color:var(--t4);font-weight:400;text-align:center;margin-top:3px;white-space:nowrap}
.stage-line-v{position:absolute;top:52px;width:0.5px;background:linear-gradient(to bottom,rgba(200,169,126,.15),transparent 80%)}

/* ══ NODE CARDS ══════════════════════════════ */
.node{position:absolute;background:rgba(255,255,255,.028);border:0.5px solid rgba(255,255,255,.075);border-radius:12px;cursor:pointer;transition:border-color .25s,box-shadow .25s,transform .2s;user-select:none}
.node:hover{border-color:rgba(200,169,126,.3);box-shadow:0 0 0 1px rgba(200,169,126,.08),0 8px 32px rgba(0,0,0,.7);transform:translateY(-1px)}
.node.active{border-color:rgba(200,169,126,.45);box-shadow:0 0 0 1px rgba(200,169,126,.15),0 12px 40px rgba(0,0,0,.8)}
.node.hub{background:rgba(200,169,126,.032);border-color:rgba(200,169,126,.18)}
.node-inner{padding:13px 15px 11px}
.node-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.node-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.node-name{font-size:12px;font-weight:700;letter-spacing:-.15px;color:var(--t1);flex:1}
.node-badge{font-size:8px;color:var(--t4);font-weight:500;letter-spacing:.3px;flex-shrink:0;background:rgba(255,255,255,.05);padding:2px 6px;border-radius:4px}
.node-sub{font-size:10px;color:var(--t3);font-weight:300;font-style:italic;line-height:1.5;margin-bottom:6px}
.node-tags{display:flex;flex-wrap:wrap;gap:3px}
.node-tag{font-size:8.5px;color:var(--t4);background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.06);border-radius:4px;padding:2px 6px;font-weight:400}
.node-err{display:inline-flex;align-items:center;gap:4px;margin-top:5px;padding:2px 7px;background:rgba(160,114,114,.09);border:0.5px solid rgba(160,114,114,.2);border-radius:20px;font-size:8px;color:var(--c-err);font-weight:500}
.node-err::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--c-err);flex-shrink:0}

/* ══ ARROWS SVG ══════════════════════════════ */
.arrows-svg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
.e-path{fill:none;stroke-linecap:round}
.e-label-bg{rx:3}
.e-label-txt{font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;font-weight:400}

/* ══ DETAIL PANEL ════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(5,5,5,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.overlay.show{opacity:1;pointer-events:auto}
.detail-panel{position:fixed;right:0;top:0;width:340px;height:100vh;background:#0B0B0B;border-left:0.5px solid var(--border);padding:0;overflow:hidden;transform:translateX(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:400;display:flex;flex-direction:column}
.detail-panel.open{transform:translateX(0)}
.dp-top{padding:28px 26px 20px;border-bottom:0.5px solid var(--border);position:relative;flex-shrink:0}
.dp-close{position:absolute;top:18px;right:18px;width:28px;height:28px;background:rgba(255,255,255,.06);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:var(--t3);transition:background .2s,color .2s}
.dp-close:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.dp-close svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round}
.dp-eyebrow{font-size:9px;letter-spacing:4px;color:var(--gold);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.dp-title{font-size:24px;font-weight:200;letter-spacing:-.6px;line-height:1.1;margin-bottom:4px}
.dp-title b{font-weight:700}
.dp-sub{font-size:12px;color:var(--t3);font-style:italic;font-weight:300;line-height:1.6}
.dp-body{flex:1;overflow-y:auto;padding:20px 26px;scrollbar-width:none}
.dp-body::-webkit-scrollbar{display:none}
.dp-section{margin-bottom:18px}
.dp-s-label{font-size:8.5px;letter-spacing:3px;color:var(--gold);font-weight:600;text-transform:uppercase;margin-bottom:8px}
.dp-s-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.dp-s-list li{font-size:11.5px;color:var(--t2);font-weight:300;line-height:1.6;padding-left:14px;position:relative}
.dp-s-list li::before{content:'—';position:absolute;left:0;color:var(--gold);opacity:.45;font-size:9px;top:1px}
.dp-tr{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--t2);line-height:1.6;margin-bottom:5px}
.dp-tr-a{color:var(--gold);flex-shrink:0;font-size:13px;line-height:1.5}
.dp-errs{display:flex;flex-direction:column;gap:5px}
.dp-err-item{font-size:10.5px;color:var(--c-err);padding:6px 11px;background:rgba(160,114,114,.07);border:0.5px solid rgba(160,114,114,.16);border-radius:7px;line-height:1.55;font-weight:300}
.dp-no-err{font-size:11px;color:var(--t4);font-weight:300;font-style:italic}
.dp-ehs{display:flex;flex-wrap:wrap;gap:4px}
.dp-eh{padding:3px 8px;background:rgba(255,255,255,.04);border:0.5px solid var(--border);border-radius:5px;font-size:9.5px;color:var(--t4);font-weight:500}
</style>
</head>

    <div id="dpTop"></div>
  </div>
  <div class="dp-body" id="dpBody"></div>
</div>

const COLOR = {
  main:  '#C8A97E',
  auto:  '#6DB8A8',
  alt:   '#8898A8',
  nav:   '#9A8AAA',
  loop:  '#A8986E',
};
const OPACITY = { main:'0.85', auto:'0.85', alt:'0.55', nav:'0.65', loop:'0.55' };
const DASH    = { alt:'5 3', loop:'3 4' };

// Build arrowhead defs
let defs = '<defs>';
Object.entries(COLOR).forEach(([t,c]) => {
  const op = t==='alt'||t==='loop' ? '0.7' : '0.9';
  defs += `<marker id="ah-${t}" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
    <path d="M0,0 L0,6 L7,3 z" fill="${c}" opacity="${op}"/>
  </marker>`;
});
defs += '</defs>';
svg.innerHTML = defs;

function addEdge(d1x,d1y,d2x,d2y,type,label){
  const c = COLOR[type]||'#C8A97E';
  const op = OPACITY[type]||'0.8';
  const da = DASH[type]||'';
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('class','e-path');
  path.setAttribute('d',`${d1x},${d1y},${d2x},${d2y}`); // placeholder — overwritten
  path.setAttribute('stroke',c);
  path.setAttribute('opacity',op);
  if(da) path.setAttribute('stroke-dasharray',da);
  path.setAttribute('stroke-width','1.4');
  path.setAttribute('marker-end',`url(#ah-${type})`);
  return path;
}

function makePath(x1,y1,x2,y2,cx1,cy1,cx2,cy2){ return `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`; }

function addArrow(x1,y1,x2,y2,cx1,cy1,cx2,cy2,type,label){
  const c = COLOR[type]||'#C8A97E';
  const op = parseFloat(OPACITY[type]||'0.8');
  const da = DASH[type]||'';

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('class','e-path');
  path.setAttribute('d', makePath(x1,y1,x2,y2,cx1,cy1,cx2,cy2));
  path.setAttribute('stroke',c);
  path.setAttribute('opacity',String(op));
  path.setAttribute('stroke-width','1.4');
  if(da) path.setAttribute('stroke-dasharray',da);
  path.setAttribute('marker-end',`url(#ah-${type})`);
  svg.appendChild(path);

  // Label
  const mx = (x1+cx1+cx2+x2)/4;
  const my = (y1+cy1+cy2+y2)/4;
  const tw = label.length * 5.0 + 10;
  const th = 14;

  const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('x', mx-tw/2); bg.setAttribute('y', my-th/2);
  bg.setAttribute('width',tw); bg.setAttribute('height',th);
  bg.setAttribute('rx','3'); bg.setAttribute('fill','#070707');
  bg.setAttribute('opacity','0.88');
  svg.appendChild(bg);

  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', mx); txt.setAttribute('y', my+4);
  txt.setAttribute('class','e-label-txt');
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('fill', c);
  txt.setAttribute('opacity', String(op*0.9));
  txt.setAttribute('font-size','9');
  txt.textContent = label;
  svg.appendChild(txt);
}

/* ══════════════════════════════════════════════
   ZOOM + PAN
   ══════════════════════════════════════════════ */
const viewport = document.getElementById('viewport');
let scale = 1, panX = 0, panY = 0;
let isPanning = false, startX = 0, startY = 0, startPanX = 0, startPanY = 0;

function applyTransform(animate=false){
  if(animate) panLayer.style.transition = 'transform .4s cubic-bezier(.16,1,.3,1)';
  else panLayer.style.transition = 'none';
  panLayer.style.transform = `translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zoomPct').textContent = Math.round(scale*100)+'%';
}

function fitToScreen(animate=true){
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const padding = 60;
  const scaleX = (vw - padding*2) / CANVAS_W;
  const scaleY = (vh - padding*2) / CANVAS_H;
  scale = Math.min(scaleX, scaleY, 1.0);
  const displayW = CANVAS_W * scale;
  const displayH = CANVAS_H * scale;
  panX = (vw - displayW) / 2;
  panY = (vh - displayH) / 2;
  applyTransform(animate);
}

// Initial fit
fitToScreen(false);

document.getElementById('fitBtn').onclick = () => fitToScreen(true);

document.getElementById('zoomIn').onclick = () => {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const newScale = Math.min(scale * 1.2, 2.5);
  const cx = vw/2, cyy = vh/2;
  panX = cx - (cx - panX) * (newScale/scale);
  panY = cyy - (cyy - panY) * (newScale/scale);
  scale = newScale;
  applyTransform(true);
};

document.getElementById('zoomOut').onclick = () => {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const newScale = Math.max(scale / 1.2, 0.15);
  const cx = vw/2, cyy = vh/2;
  panX = cx - (cx - panX) * (newScale/scale);
  panY = cyy - (cyy - panY) * (newScale/scale);
  scale = newScale;
  applyTransform(true);
};

// Scroll wheel zoom
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newScale = Math.min(Math.max(scale*factor, 0.15), 2.5);
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newScale/scale);
  panY = my - (my - panY) * (newScale/scale);
  scale = newScale;
  applyTransform(false);
}, { passive:false });

// Pan drag
viewport.addEventListener('mousedown', e => {
  if(e.target.closest('.node')) return;
  isPanning = true;
  startX = e.clientX; startY = e.clientY;
  startPanX = panX; startPanY = panY;
  viewport.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if(!isPanning) return;
  panX = startPanX + (e.clientX - startX);
  panY = startPanY + (e.clientY - startY);
  applyTransform(false);
});
window.addEventListener('mouseup', () => {
  isPanning = false;
  viewport.classList.remove('grabbing');
});

// Touch pan
let lastTouchX=0, lastTouchY=0, touchStartDist=0, touchStartScale=1;
viewport.addEventListener('touchstart', e => {
  if(e.touches.length===1){
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  } else if(e.touches.length===2){
    touchStartDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    touchStartScale = scale;
  }
},{passive:true});
viewport.addEventListener('touchmove', e => {
  e.preventDefault();
  if(e.touches.length===1){
    panX += e.touches[0].clientX - lastTouchX;
    panY += e.touches[0].clientY - lastTouchY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    applyTransform(false);
  } else if(e.touches.length===2){
    const dist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    scale = Math.min(Math.max(touchStartScale*(dist/touchStartDist),0.15),2.5);
    applyTransform(false);
  }
},{passive:false});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT') return;
  if(e.key==='+' || e.key==='=') document.getElementById('zoomIn').click();
  if(e.key==='-') document.getElementById('zoomOut').click();
  if(e.key==='0') fitToScreen(true);
  if(e.key==='Escape') closePanel();
});

/* ══════════════════════════════════════════════
   DETAIL PANEL
   ══════════════════════════════════════════════ */
function openPanel(id){
  const n = NODES.find(x=>x.id===id);
  if(!n) return;
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('active'));
  document.getElementById('nd-'+id).classList.add('active');

  document.getElementById('dpTop').innerHTML = `
    <div class="dp-eyebrow">Stage ${n.stage} · ${n.stageLabel}</div>
    <div class="dp-title"><b>${n.label}</b></div>
    <div class="dp-sub">${n.sub}</div>`;

  const transitions = n.transitions.map(t=>`<div class="dp-tr"><span class="dp-tr-a">›</span><span>${t}</span></div>`).join('');
  const errors = n.errors.length
    ? n.errors.map(e=>`<div class="dp-err-item">${e}</div>`).join('')
    : '<div class="dp-no-err">No error states for this screen.</div>';
  const ehCodes = n.ehCodes.length
    ? `<div class="dp-section"><div class="dp-s-label">Error Handling Codes</div><div class="dp-ehs">${n.ehCodes.map(c=>`<span class="dp-eh">${c}</span>`).join('')}</div></div>`
    : '';

  document.getElementById('dpBody').innerHTML = `
    <div class="dp-section">
      <div class="dp-s-label">Screen Details</div>
      <ul class="dp-s-list">${n.details.map(d=>`<li>${d}</li>`).join('')}</ul>
    </div>
    <div class="dp-section">
      <div class="dp-s-label">Transitions Out</div>
      ${transitions}
    </div>
    <div class="dp-section">
      <div class="dp-s-label">Error States</div>
      <div class="dp-errs">${errors}</div>
    </div>
    ${ehCodes}`;

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closePanel(){
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.node').forEach(el=>el.classList.remove('active'));
}
</script>
