<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:'SF Pro Display','Segoe UI',sans-serif;overflow:hidden;height:100vh}
#toolbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(10,10,20,0.96);border-bottom:1px solid #222;display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;backdrop-filter:blur(10px)}
#toolbar h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px;margin-right:8px}
#toolbar h2{font-size:12px;font-weight:400;color:#666;letter-spacing:.3px}
.tbtn{background:rgba(255,255,255,0.07);border:1px solid #333;color:#ccc;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.tbtn:hover{background:rgba(255,255,255,0.13);color:#fff}
#nodecount{margin-left:auto;font-size:11px;color:#555}
#canvas-wrap{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
.node-rect{rx:8;cursor:pointer}
.node-label{font-size:11px;font-weight:600;fill:#fff;pointer-events:none;dominant-baseline:middle;text-anchor:middle}
.node-sub{font-size:9px;fill:rgba(255,255,255,0.5);pointer-events:none;dominant-baseline:middle;text-anchor:middle}
.edge-path{fill:none;stroke-width:1.8;opacity:0.65}
.edge-label{font-size:9px;fill:#888;pointer-events:none;text-anchor:middle}
#detail{position:fixed;top:52px;right:-340px;width:320px;bottom:0;background:rgba(15,15,25,0.97);border-left:1px solid #2a2a3a;padding:20px;transition:right .25s cubic-bezier(.4,0,.2,1);z-index:200;overflow-y:auto}
#detail.open{right:0}
#detail h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
#detail .dtag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-bottom:12px;opacity:.85}
#detail .dlink{padding:8px 0;border-bottom:1px solid #222;font-size:12px;color:#aaa;display:flex;align-items:center;gap:8px;cursor:pointer;transition:color .15s}
#detail .dlink:hover{color:#fff}
#detail .arr{color:#666}
#flowmap{position:fixed;bottom:20px;left:20px;width:200px;background:rgba(15,15,25,0.95);border:1px solid #333;border-radius:8px;padding:12px;z-index:150;max-height:40vh;overflow-y:auto;transition:all .25s;opacity:0;pointer-events:none}
#flowmap.open{opacity:1;pointer-events:auto}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:11px;color:#888}
.leg-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.leg-label{flex:1}
#zoomlbl{font-size:11px;color:#555;margin-left:auto}
.lane-label{font-size:11px;font-weight:600;fill:#fff;opacity:0.7}

var NODES = [];
var nodeMap = {};
NODE_DEFS.forEach(function(d){
  NODES.push(d);
  nodeMap[d.id] = d;
});

function hexToRgb(h){return parseInt(h.slice(1,3),16)+","+parseInt(h.slice(3,5),16)+","+parseInt(h.slice(5,7),16);}
function svgEl(tag,attrs){var el=document.createElementNS("http://www.w3.org/2000/svg",tag);if(attrs)Object.keys(attrs).forEach(function(k){el.setAttribute(k,attrs[k]);});return el;}
function wrapText(label){var w=label.split(" ");if(w.length<=2)return[label,""];var m=Math.ceil(w.length/2);return[w.slice(0,m).join(" "),w.slice(m).join(" ")];}

function buildSVG(){
  var lanesG = document.getElementById("lanes");
  var edgesG = document.getElementById("edges");
  var nodesG = document.getElementById("nodes");
  
  LANES.forEach(function(lane){
    var rect = svgEl("rect", {x:"0", y:lane[2], width:CW, height:"266", fill:"rgba(255,255,255,0.01)", stroke:"#222", "stroke-width":"1"});
    lanesG.appendChild(rect);
    var lbl = svgEl("text", {x:"10", y:lane[2]+20, "class":"lane-label"});
    lbl.textContent = lane[1];
    lanesG.appendChild(lbl);
  });
  
  EDGES.forEach(function(e){
    var src = nodeMap[e[0]], dst = nodeMap[e[1]];
    if(!src || !dst) return;
    var path = svgEl("path", {d:"M "+src.x+" "+src.y+" Q "+((src.x+dst.x)/2)+" "+((src.y+dst.y)/2)+" "+dst.x+" "+dst.y, "class":"edge-path", stroke:(laneMap[src.lane][3]||"#666"), "marker-end":"url(#arrowhead)"});
    edgesG.appendChild(path);
    if(e[2]){
      var mx = (src.x + dst.x) / 2;
      var my = (src.y + dst.y) / 2;
      var lbl = svgEl("text", {"class":"edge-label", x:mx, y:my-6, "data-elabel":"1"});
      lbl.textContent = e[2];
      lbl.style.display = "none";
      edgesG.appendChild(lbl);
    }
  });
  
  NODES.forEach(function(n){
    var isBranch = n.id.match(/s[0-9]|2s[0-9]|ps[0-9]|rs[0-9]|ss[0-9]|ds[0-9]|es[0-9]|bs[0-9]|sps[0-9]|c2s[0-9]/) !== null;
    var w = isBranch ? BW : NW;
    var h = isBranch ? BH : NH;
    var laneColor = laneMap[n.lane][3];
    var grp = svgEl("g", {"data-nid":n.id, "class":"node-group"});
    var rect = svgEl("rect", {"class":"node-rect", x:n.x-w/2, y:n.y-h/2, width:w, height:h, fill:laneColor, opacity:"0.85"});
    grp.appendChild(rect);
    var lbl = svgEl("text", {"class":"node-label", x:n.x, y:n.y-6});
    lbl.textContent = n.label;
    grp.appendChild(lbl);
    var sub = svgEl("text", {"class":"node-sub", x:n.x, y:n.y+10});
    sub.textContent = n.sub;
    grp.appendChild(sub);
    grp.addEventListener("click",function(){showDetail(n.id);});
    nodesG.appendChild(grp);
  });
}

function showDetail(id){
  var n = nodeMap[id];
  if(!n) return;
  document.getElementById("dname").textContent = n.label;
  document.getElementById("dtag").innerHTML = "<span class='dtag' style='background:"+laneMap[n.lane][3]+";opacity:0.6'>"+n.lane+"</span>";
  document.getElementById("dlabel").innerHTML = "<p style='font-size:12px;color:#aaa;margin-bottom:12px'>"+n.sub+"</p>";
  var outEl = document.getElementById("dout");
  var inEl = document.getElementById("din");
  outEl.innerHTML = "<strong>Outputs:</strong>";
  inEl.innerHTML = "<strong>Inputs:</strong>";
  EDGES.forEach(function(e){
    if(e[0]===id){var tgt=nodeMap[e[1]];if(!tgt)return;var d=document.createElement("div");d.className="dlink";d.innerHTML="<span class='arr'>&#x2192;</span><span class='lbl'>"+tgt.label+"</span><span style='margin-left:auto;font-size:10px;color:#555'>"+e[2]+"</span>";d.onclick=function(){showDetail(e[1]);};outEl.appendChild(d);}
    if(e[1]===id){var src=nodeMap[e[0]];if(!src)return;var d2=document.createElement("div");d2.className="dlink";d2.innerHTML="<span class='arr'>&#x2190;</span><span class='lbl'>"+src.label+"</span><span style='margin-left:auto;font-size:10px;color:#555'>"+e[2]+"</span>";d2.onclick=function(){showDetail(e[0]);};inEl.appendChild(d2);}
  });
  document.getElementById("detail").classList.add("open");
}

function closeDetail(){document.getElementById("detail").classList.remove("open");}

function buildLegend(){var el=document.getElementById("leg-rows");LANES.forEach(function(l){var row=document.createElement("div");row.className="leg-row";row.innerHTML="<div class='leg-swatch' style='background:"+l[3]+"'></div><span class='leg-label'>"+l[1]+"</span>";el.appendChild(row);});}

function applyTransform(){var g=document.getElementById("main-g");if(g)g.setAttribute("transform","translate("+tx+","+ty+") scale("+scale+")");document.getElementById("zoomlbl").textContent=Math.round(scale*100)+"%";}
function fitToScreen(){var w=document.getElementById("canvas-wrap");var vw=w.offsetWidth,vh=w.offsetHeight;scale=Math.min((vw-40)/CW,(vh-40)/CH);tx=(vw-CW*scale)/2;ty=20;applyTransform();}
function resetZoom(){scale=1;tx=40;ty=20;applyTransform();}
function toggleEdgeLabels(){showLabels=!showLabels;document.querySelectorAll("[data-elabel]").forEach(function(el){el.style.display=showLabels?"":"none";});document.getElementById("toggleLabels").textContent=showLabels?"Hide Labels":"Show Labels";}
function toggleFlowMap(){document.getElementById('flowmap').classList.toggle('open');}

window.addEventListener("load",function(){
  document.getElementById("nodecount").textContent = NODES.length + " nodes · " + EDGES.length + " connections";
  buildSVG();
  buildLegend();
  fitToScreen();
  
  var wrap = document.getElementById("canvas-wrap");
  wrap.addEventListener("wheel",function(e){e.preventDefault();var r=wrap.getBoundingClientRect();var mx=e.clientX-r.left,my=e.clientY-r.top;var delta=e.deltaY>0?0.875:1.143;var ns=Math.max(0.1,Math.min(4,scale*delta));tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;applyTransform();},{passive:false});
  wrap.addEventListener("mousedown",function(e){if(e.target.closest("[data-nid]"))return;dragging=true;dragStartX=e.clientX;dragStartY=e.clientY;txStart=tx;tyStart=ty;wrap.classList.add("dragging");});
  document.addEventListener("mousemove",function(e){if(!dragging)return;tx=txStart+(e.clientX-dragStartX);ty=tyStart+(e.clientY-dragStartY);applyTransform();});
  document.addEventListener("mouseup",function(){dragging=false;document.getElementById("canvas-wrap").classList.remove("dragging");});
  
  wrap.addEventListener("touchstart",function(e){if(e.touches.length===1){dragging=true;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;txStart=tx;tyStart=ty;}else if(e.touches.length===2){dragging=false;var dx=e.touches[0].clientX-e.touches[1].clientX;var dy=e.touches[0].clientY-e.touches[1].clientY;ltd=Math.sqrt(dx*dx+dy*dy);ltm={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};}},{passive:true});
  wrap.addEventListener("touchmove",function(e){e.preventDefault();if(e.touches.length===1&&dragging){tx=txStart+(e.touches[0].clientX-dragStartX);ty=tyStart+(e.touches[0].clientY-dragStartY);applyTransform();}else if(e.touches.length===2&&ltd){var dx=e.touches[0].clientX-e.touches[1].clientX;var dy=e.touches[0].clientY-e.touches[1].clientY;var dist=Math.sqrt(dx*dx+dy*dy);var d2=dist/ltd;var mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};var ns=Math.max(0.1,Math.min(4,scale*d2));tx=mid.x-(ltm.x-tx)*(ns/scale);ty=mid.y-(ltm.y-ty)*(ns/scale);scale=ns;ltd=dist;ltm=mid;applyTransform();}},{passive:false});
  wrap.addEventListener("touchend",function(){dragging=false;ltd=null;});
  document.addEventListener("keydown",function(e){var s=40;if(e.key==="ArrowLeft"){tx+=s;applyTransform();}if(e.key==="ArrowRight"){tx-=s;applyTransform();}if(e.key==="ArrowUp"){ty+=s;applyTransform();}if(e.key==="ArrowDown"){ty-=s;applyTransform();}if(e.key==="+"||e.key==="="){scale=Math.min(4,scale*1.15);applyTransform();}if(e.key==="-"){scale=Math.max(0.1,scale*0.87);applyTransform();}if(e.key==="0"){fitToScreen();}if(e.key==="Escape"){closeDetail();}});
  
  document.getElementById("toggleLabels").addEventListener("click", toggleEdgeLabels);
  document.getElementById("toggleFlowBtn").addEventListener("click", toggleFlowMap);
  document.getElementById("detail").addEventListener("click", function(e){if(e.target === this) closeDetail();});
});
</script>
