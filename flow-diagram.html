<html lang="en">

<title>BARSYS ARK — User Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;--s1:#0B0B0B;
  --gold:#C8A97E;--gold-l:#E8D5B5;
  --t1:#fff;--t2:rgba(255,255,255,.62);--t3:rgba(255,255,255,.32);--t4:rgba(255,255,255,.14);
  --glass:rgba(255,255,255,.028);--glass2:rgba(255,255,255,.055);
  --brd:rgba(255,255,255,.08);
  --cm:#C8A97E;--ca:#6DB8A8;--cb:#8898A8;--cn:#9A8AAA;--cl:#A8986E;
}
html,body{background:var(--bg);color:var(--t1);font-family:"Plus Jakarta Sans",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden;height:100%;width:100%}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(5,5,5,.95);border-bottom:.5px solid var(--brd);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:200;gap:12px}
.nav-l{display:flex;align-items:center;gap:12px;flex-shrink:0}
.back{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;background:var(--glass2);border:.5px solid var(--brd);border-radius:8px;color:var(--t3);font-size:12px;font-weight:500;text-decoration:none;transition:all .2s;white-space:nowrap}
.back:hover{color:var(--gold);border-color:rgba(200,169,126,.3)}
.back svg{width:13px;height:13px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-title{font-size:13px;font-weight:700;letter-spacing:.2px;white-space:nowrap}
.nav-sub{font-size:11px;color:var(--t3);font-weight:300;white-space:nowrap}
.nav-r{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* LEGEND */
.legend{display:flex;align-items:center;gap:10px;padding:5px 12px;background:var(--glass2);border:.5px solid var(--brd);border-radius:8px}
.li{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--t4);white-space:nowrap}
.ll{width:16px;height:1.5px;border-radius:1px;flex-shrink:0}
.li.m .ll{background:var(--cm)}
.li.a .ll{background:var(--ca)}
.li.b .ll{background:var(--cb);opacity:.7}
.li.n .ll{background:var(--cn)}
.li.l .ll{background:var(--cl);opacity:.65}

/* ZOOM */
.zbox{display:flex;align-items:center;gap:4px;background:var(--glass2);border:.5px solid var(--brd);border-radius:8px;padding:4px 7px}
.zb{width:26px;height:26px;background:0;border:none;color:var(--t3);cursor:pointer;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:200;line-height:1;transition:all .15s}
.zb:hover{background:rgba(200,169,126,.1);color:var(--gold)}
.zpct{font-size:11px;color:var(--t3);font-weight:500;min-width:34px;text-align:center;font-variant-numeric:tabular-nums}
.fitbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:rgba(200,169,126,.1);border:.5px solid rgba(200,169,126,.28);border-radius:8px;color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.fitbtn:hover{background:rgba(200,169,126,.18)}

/* VIEWPORT */
.vp{position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
.vp.gr{cursor:grabbing}
.pl{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}

/* NODE CARDS */
.node{position:absolute;background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;transition:border-color .25s,box-shadow .25s,transform .2s;user-select:none}
.node:hover{border-color:rgba(200,169,126,.3);box-shadow:0 0 0 1px rgba(200,169,126,.07),0 8px 32px rgba(0,0,0,.65);transform:translateY(-1px)}
.node.act{border-color:rgba(200,169,126,.44);box-shadow:0 0 0 1px rgba(200,169,126,.14),0 12px 40px rgba(0,0,0,.8)}
.node.hub{background:rgba(200,169,126,.045);border-color:rgba(200,169,126,.2)!important}
.ni{padding:12px 14px 10px}
.nh{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.nd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.nn{font-size:11.5px;font-weight:700;letter-spacing:-.1px;flex:1}
.nb{font-size:7.5px;color:var(--t4);font-weight:500;background:rgba(255,255,255,.04);padding:1px 5px;border-radius:3px;flex-shrink:0}
.ns{font-size:9px;color:var(--t3);font-weight:300;font-style:italic;line-height:1.55;margin-bottom:5px}
.ntags{display:flex;flex-wrap:wrap;gap:2px}
.ntag{font-size:7.5px;color:var(--t4);background:rgba(255,255,255,.035);border:.5px solid rgba(255,255,255,.055);border-radius:3px;padding:1px 5px}
.nerr{display:inline-flex;align-items:center;gap:3px;margin-top:5px;padding:2px 6px;background:rgba(160,114,114,.09);border:.5px solid rgba(160,114,114,.2);border-radius:12px;font-size:7.5px;color:#A07272;font-weight:500}
.nerr::before{content:"";width:3px;height:3px;border-radius:50%;background:#A07272;flex-shrink:0}

/* STAGE LABELS */
.stl{position:absolute;display:flex;flex-direction:column;align-items:center;pointer-events:none;transform:translateX(-50%)}
.stpill{padding:3px 9px;background:rgba(200,169,126,.07);border:.5px solid rgba(200,169,126,.15);border-radius:16px}
.stn{font-size:7px;letter-spacing:2px;color:var(--gold);font-weight:600;text-transform:uppercase;white-space:nowrap}
.stnum{font-size:6.5px;color:var(--t4);text-align:center;margin-top:2px;white-space:nowrap}

/* SECTION LABEL (for tab group, auth group) */
.grplbl{position:absolute;font-size:7px;letter-spacing:1.5px;color:rgba(200,169,126,.3);font-weight:600;text-transform:uppercase;white-space:nowrap;pointer-events:none}

/* ARROWS */
.asv{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.ep{fill:none;stroke-linecap:round}

/* DETAIL PANEL */
.ov{position:fixed;inset:0;background:rgba(5,5,5,.45);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(5px)}
.ov.show{opacity:1;pointer-events:auto}
.dp{position:fixed;right:0;top:0;width:340px;height:100vh;background:#0A0A0A;border-left:.5px solid var(--brd);overflow:hidden;transform:translateX(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);z-index:400;display:flex;flex-direction:column}
.dp.open{transform:translateX(0)}
.dptop{padding:24px 22px 16px;border-bottom:.5px solid var(--brd);position:relative;flex-shrink:0}
.dpcls{position:absolute;top:14px;right:14px;width:26px;height:26px;background:rgba(255,255,255,.06);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:var(--t3);transition:all .2s}
.dpcls:hover{background:rgba(255,255,255,.12);color:var(--t1)}
.dpcls svg{width:11px;height:11px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round}
.dpey{font-size:8px;letter-spacing:3.5px;color:var(--gold);font-weight:600;text-transform:uppercase;margin-bottom:5px}
.dph{font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1.15;margin-bottom:3px}
.dps{font-size:11px;color:var(--t3);font-style:italic;font-weight:300;line-height:1.6}
.dpbd{flex:1;overflow-y:auto;padding:18px 22px;scrollbar-width:none}
.dpbd::-webkit-scrollbar{display:none}
.dpsec{margin-bottom:16px}
.dpsl{font-size:7.5px;letter-spacing:3px;color:var(--gold);font-weight:600;text-transform:uppercase;margin-bottom:7px}
.dplist{list-style:none;display:flex;flex-direction:column;gap:4px}
.dplist li{font-size:10.5px;color:var(--t2);font-weight:300;line-height:1.6;padding-left:12px;position:relative}
.dplist li::before{content:"--";position:absolute;left:0;color:var(--gold);opacity:.35;font-size:8px;top:2px}
.dptrs{display:flex;flex-direction:column;gap:4px}
.dptr{display:flex;gap:6px;font-size:10px;color:var(--t2);line-height:1.6}
.dptra{color:var(--gold);flex-shrink:0;font-size:12px;line-height:1.5}
.dperrs{display:flex;flex-direction:column;gap:4px}
.dperr{font-size:10px;color:#A07272;padding:5px 10px;background:rgba(160,114,114,.07);border:.5px solid rgba(160,114,114,.15);border-radius:6px;line-height:1.55;font-weight:300}
.dpnoerr{font-size:10px;color:var(--t4);font-style:italic;font-weight:300}
.dpehs{display:flex;flex-wrap:wrap;gap:3px}
.dpeh{padding:2px 7px;background:rgba(255,255,255,.04);border:.5px solid var(--brd);border-radius:4px;font-size:9px;color:var(--t4)}
</style>
</head>

/* Arrowhead markers */
var defs = "<defs>";
["m","a","b","n","l"].forEach(function(t){
  var c = AC[t];
  var op = (t==="b"||t==="l") ? .65 : .9;
  defs += "<marker id=\"ah-" + t + "\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5.5\" refY=\"3\" orient=\"auto\">" +
          "<path d=\"M0,0 L0,6 L7,3 z\" fill=\"" + c + "\" opacity=\"" + op + "\"/></marker>";
});
defs += "</defs>";
svg.innerHTML = defs;

function bezMid(x1,y1,cx1,cy1,cx2,cy2,x2,y2){
  return {
    x: x1/8 + cx1*3/8 + cx2*3/8 + x2/8,
    y: y1/8 + cy1*3/8 + cy2*3/8 + y2/8
  };
}

function arrow(x1,y1,x2,y2,pcx1,pcy1,pcx2,pcy2,type,lbl){
  var c  = AC[type];
  var op = AO[type];
  var da = AD[type] || "";

  /* path */
  var p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d","M"+x1+","+y1+" C"+pcx1+","+pcy1+" "+pcx2+","+pcy2+" "+x2+","+y2);
  p.setAttribute("class","ep");
  p.setAttribute("stroke",c);
  p.setAttribute("opacity",String(op));
  p.setAttribute("stroke-width","1.5");
  if(da) p.setAttribute("stroke-dasharray",da);
  p.setAttribute("marker-end","url(#ah-"+type+")");
  svg.appendChild(p);

  /* label */
  var mid = bezMid(x1,y1,pcx1,pcy1,pcx2,pcy2,x2,y2);
  var tw = lbl.length * 4.9 + 10;
  var th = 13;
  var bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("x",  mid.x - tw/2);
  bg.setAttribute("y",  mid.y - th/2);
  bg.setAttribute("width",  tw);
  bg.setAttribute("height", th);
  bg.setAttribute("rx","3");
  bg.setAttribute("fill","#070707");
  bg.setAttribute("opacity",".9");
  svg.appendChild(bg);

  var txt = document.createElementNS("http://www.w3.org/2000/svg","text");
  txt.setAttribute("x", mid.x);
  txt.setAttribute("y", mid.y + 4);
  txt.setAttribute("text-anchor","middle");
  txt.setAttribute("font-family","\"Plus Jakarta Sans\",sans-serif");
  txt.setAttribute("font-size","8.5");
  txt.setAttribute("fill",c);
  txt.setAttribute("opacity",String(op * .85));
  txt.textContent = lbl;
  svg.appendChild(txt);
}

/* =====================================================
   ZOOM / PAN
   ===================================================== */
var vp   = document.getElementById("vp");
var scale = 1;
var panX  = 0;
var panY  = 0;
var isDragging  = false;
var dragStartX  = 0;
var dragStartY  = 0;
var dragStartPX = 0;
var dragStartPY = 0;

function applyT(animate){
  pl.style.transition = animate ? "transform .35s cubic-bezier(.16,1,.3,1)" : "none";
  pl.style.transform  = "translate(" + panX + "px," + panY + "px) scale(" + scale + ")";
  document.getElementById("zpct").textContent = Math.round(scale * 100) + "%";
}

function fitToScreen(animate){
  var vw = vp.clientWidth  || window.innerWidth;
  var vh = vp.clientHeight || (window.innerHeight - 56);
  var pad = 60;
  var sx  = (vw - pad*2) / CW;
  var sy  = (vh - pad*2) / CH;
  scale   = Math.min(sx, sy, 1.0);
  if(scale <= 0) scale = 0.5;
  var dw  = CW * scale;
  var dh  = CH * scale;
  panX    = (vw - dw) / 2;
  panY    = (vh - dh) / 2;
  applyT(animate == null ? true : animate);
}

/* Initial fit after layout is ready */
window.addEventListener("load", function(){
  fitToScreen(false);
});
/* Fallback if load already fired */
if(document.readyState === "complete"){
  fitToScreen(false);
}

document.getElementById("fitBtn").onclick = function(){ fitToScreen(true); };

document.getElementById("zIn").onclick = function(){
  var vw = vp.clientWidth, vh = vp.clientHeight;
  var ns = Math.min(scale * 1.2, 2.5);
  panX = vw/2 - (vw/2 - panX) * ns/scale;
  panY = vh/2 - (vh/2 - panY) * ns/scale;
  scale = ns;
  applyT(true);
};

document.getElementById("zOut").onclick = function(){
  var vw = vp.clientWidth, vh = vp.clientHeight;
  var ns = Math.max(scale / 1.2, 0.12);
  panX = vw/2 - (vw/2 - panX) * ns/scale;
  panY = vh/2 - (vh/2 - panY) * ns/scale;
  scale = ns;
  applyT(true);
};

/* Scroll wheel zoom */
vp.addEventListener("wheel", function(e){
  e.preventDefault();
  var factor = e.deltaY < 0 ? 1.1 : 0.9;
  var ns = Math.min(Math.max(scale * factor, 0.12), 2.5);
  var rect = vp.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  panX = mx - (mx - panX) * ns/scale;
  panY = my - (my - panY) * ns/scale;
  scale = ns;
  applyT(false);
}, {passive:false});

/* Mouse drag */
vp.addEventListener("mousedown", function(e){
  if(e.target.closest(".node")) return;
  isDragging  = true;
  dragStartX  = e.clientX;
  dragStartY  = e.clientY;
  dragStartPX = panX;
  dragStartPY = panY;
  vp.classList.add("gr");
});
window.addEventListener("mousemove", function(e){
  if(!isDragging) return;
  panX = dragStartPX + (e.clientX - dragStartX);
  panY = dragStartPY + (e.clientY - dragStartY);
  applyT(false);
});
window.addEventListener("mouseup", function(){
  isDragging = false;
  vp.classList.remove("gr");
});

/* Touch */
var touchLastX=0, touchLastY=0, touchDist0=0, touchScale0=0;
vp.addEventListener("touchstart", function(e){
  if(e.touches.length===1){
    touchLastX = e.touches[0].clientX;
    touchLastY = e.touches[0].clientY;
  } else if(e.touches.length===2){
    touchDist0   = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    touchScale0  = scale;
  }
},{passive:true});
vp.addEventListener("touchmove", function(e){
  e.preventDefault();
  if(e.touches.length===1){
    panX += e.touches[0].clientX - touchLastX;
    panY += e.touches[0].clientY - touchLastY;
    touchLastX = e.touches[0].clientX;
    touchLastY = e.touches[0].clientY;
    applyT(false);
  } else if(e.touches.length===2){
    var d  = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    scale  = Math.min(Math.max(touchScale0 * d/touchDist0, 0.12), 2.5);
    applyT(false);
  }
},{passive:false});

/* Keyboard */
document.addEventListener("keydown", function(e){
  if(e.target.tagName==="INPUT") return;
  if(e.key==="+" || e.key==="=") document.getElementById("zIn").click();
  if(e.key==="-" || e.key==="_") document.getElementById("zOut").click();
  if(e.key==="0") fitToScreen(true);
  if(e.key==="Escape") closePanel();
});

/* =====================================================
   DETAIL PANEL
   ===================================================== */
function openPanel(id){
  var n = gn(id);
  if(!n) return;
  document.querySelectorAll(".node").forEach(function(el){ el.classList.remove("act"); });
  var nd = document.getElementById("nd-"+id);
  if(nd) nd.classList.add("act");

  document.getElementById("dpTop").innerHTML =
    "<div class=\"dpey\">Stage " + n.stage + " &middot; " + n.stl + "</div>" +
    "<div class=\"dph\">" + n.label + "</div>" +
    "<div class=\"dps\">" + n.sub + "</div>";

  var trs = n.transitions.map(function(t){
    return "<div class=\"dptr\"><span class=\"dptra\">&rsaquo;</span><span>" + t + "</span></div>";
  }).join("");

  var errs = n.errors.length
    ? n.errors.map(function(e){ return "<div class=\"dperr\">" + e + "</div>"; }).join("")
    : "<div class=\"dpnoerr\">No error states for this screen.</div>";

  var ehs = n.ehCodes.length
    ? "<div class=\"dpsec\"><div class=\"dpsl\">Error Handling Codes</div><div class=\"dpehs\">" +
      n.ehCodes.map(function(c){ return "<span class=\"dpeh\">" + c + "</span>"; }).join("") +
      "</div></div>"
    : "";

  document.getElementById("dpBd").innerHTML =
    "<div class=\"dpsec\"><div class=\"dpsl\">Screen Details</div>" +
    "<ul class=\"dplist\">" + n.details.map(function(d){ return "<li>" + d + "</li>"; }).join("") + "</ul></div>" +
    "<div class=\"dpsec\"><div class=\"dpsl\">Transitions Out</div><div class=\"dptrs\">" + trs + "</div></div>" +
    "<div class=\"dpsec\"><div class=\"dpsl\">Error States</div><div class=\"dperrs\">" + errs + "</div></div>" +
    ehs;

  document.getElementById("dp").classList.add("open");
  document.getElementById("ov").classList.add("show");
}

function closePanel(){
  document.getElementById("dp").classList.remove("open");
  document.getElementById("ov").classList.remove("show");
  document.querySelectorAll(".node").forEach(function(el){ el.classList.remove("act"); });
}
</script>
