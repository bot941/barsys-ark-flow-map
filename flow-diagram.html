<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BARSYS ARK — Complete User Flow Map</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--s1:#0D0D0D;--gold:#C8A97E;--t1:#fff;--t2:rgba(255,255,255,.55);--t3:rgba(255,255,255,.25);--border:rgba(255,255,255,.06)}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--t1)}
#topbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(5,5,5,.96);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;z-index:200;backdrop-filter:blur(16px)}
#topbar a{color:var(--gold);text-decoration:none;font-size:12px;font-weight:600;letter-spacing:.2px}
#topbar h1{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
#topbar .meta{font-size:10px;color:var(--t3);letter-spacing:.3px}
.tb-sep{width:1px;height:18px;background:var(--border)}
.tb-right{margin-left:auto;display:flex;gap:6px;align-items:center}
.tb-btn{padding:5px 12px;border-radius:7px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--t2);transition:background .2s}
.tb-btn:hover{background:rgba(255,255,255,.05);color:var(--t1)}
#vp{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;user-select:none}
#vp.dragging{cursor:grabbing}
#pl{position:absolute;transform-origin:0 0}
.lane-band{position:absolute;left:0;right:0;height:200px;pointer-events:none}
.lane-label{position:absolute;left:10px;display:flex;align-items:center;gap:7px;pointer-events:none;z-index:2}
.ll-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.ll-text{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:700;opacity:.7}
.node{position:absolute;border-radius:11px;padding:9px 12px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .2s;border:1px solid rgba(255,255,255,.07)}
.node:hover{transform:scale(1.06) translateY(-1px);box-shadow:0 10px 40px rgba(0,0,0,.7);border-color:rgba(255,255,255,.18);z-index:10}
.node-label{font-size:11px;font-weight:700;letter-spacing:-.1px;line-height:1.25}
.node-sub{font-size:8.5px;color:rgba(255,255,255,.42);margin-top:3px;line-height:1.45;font-weight:400}
#sv{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.e-path{fill:none;stroke-width:1.4;stroke-linecap:round;opacity:.5}
.e-label{font-size:8px;fill:rgba(255,255,255,.38);font-family:'Plus Jakarta Sans',sans-serif;font-weight:500}
#dp{position:fixed;right:-340px;top:52px;bottom:0;width:320px;background:rgba(10,10,10,.98);border-left:1px solid var(--border);transition:right .3s cubic-bezier(.4,0,.2,1);z-index:190;overflow-y:auto;padding:24px 20px;backdrop-filter:blur(24px)}
#dp.open{right:0}
#dp-close{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--t1);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s}
#dp-close:hover{background:rgba(255,255,255,.1)}
#dp-lane{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
#dp-title{font-size:20px;font-weight:200;letter-spacing:-.4px;line-height:1.2}
#dp-title strong{font-weight:700}
#dp-sub{font-size:11px;color:var(--t2);line-height:1.7;margin-top:8px}
.dp-sect{font-size:8px;letter-spacing:2.5px;color:var(--t3);text-transform:uppercase;margin-top:18px;margin-bottom:7px;font-weight:600}
.dp-row{padding:7px 10px;background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:7px;margin-bottom:4px;font-size:10px;color:var(--t2);display:flex;align-items:flex-start;gap:7px;line-height:1.5}
.dp-row .arr{flex-shrink:0;margin-top:1px}
.dp-row .lbl{opacity:.5;font-size:9px;margin-left:4px}
#hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(10,10,10,.92);border:1px solid var(--border);border-radius:100px;padding:7px 18px;font-size:10px;color:var(--t3);pointer-events:none;z-index:100;white-space:nowrap}
#legend{position:fixed;bottom:18px;right:18px;background:rgba(10,10,10,.92);border:1px solid var(--border);border-radius:11px;padding:12px 14px;z-index:100;min-width:180px}
#legend h4{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:9px;font-weight:600}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:9px;color:var(--t2)}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>

<nav id="topbar">
  <a href="index.html">&#8592; ARK</a>
  <div class="tb-sep"></div>
  <h1>Complete User Flow Map</h1>
  <span class="meta">89 screens &middot; 8 flow lanes &middot; all paths</span>
  <div class="tb-right">
    <button class="tb-btn" onclick="fitToScreen(true)">[0] Fit</button>
    <button class="tb-btn" onclick="changeScale(0.12)">+ Zoom</button>
    <button class="tb-btn" onclick="changeScale(-0.12)">&#8722; Zoom</button>
  </div>
</nav>

<div id="vp">
  <div id="pl">
    <svg id="sv"></svg>
  </div>
</div>

<div id="dp">
  <button id="dp-close" onclick="closePanel()">&#10005;</button>
  <div id="dp-lane"></div>
  <div id="dp-title"></div>
  <p id="dp-sub"></p>
  <div class="dp-sect">Leads to</div>
  <div id="dp-out"></div>
  <div class="dp-sect">Reached from</div>
  <div id="dp-in"></div>
</div>

<div id="hint">Scroll to zoom &nbsp;&middot;&nbsp; Drag to pan &nbsp;&middot;&nbsp; Click node for detail &nbsp;&middot;&nbsp; [0] to fit</div>

  ["bb1",0,4,"BarBot Welcome","AI bartender intro screen, capability overview, Begin CTA"],

  ["re3",2,7,"Station Disconn","Station lost mid-session, Reconnect or Troubleshoot CTA"],
  ["re4",3,7,"Clean Required","Station needs flush before crafting, Start Cleaning prompt"],
  ["re5",4,7,"Pour Interrupted","Hardware error mid-pour, pause state with Resume option"],
  ["re6",5,7,"AI Timeout","BarBot no response after 8 seconds, auto-suggest alts"],
  ["re7",6,7,"Recipe Alts","AI generates compatible alternatives matching your bar"],
  ["re8",7,7,"Alt Recipe List","Swappable options shown, choose from compatible recipes"],
  ["re9",8,7,"Pour Paused","In-progress pour paused state, Resume or Cancel options"],
  ["re10",9,7,"Skip Ingredient","Option to omit one ingredient, continue adjusted pour"],
  ["re11",10,7,"Skip Confirmed","Pour sequence adjusted for skip, continue confirmed"]

var nodeMap = {};
var NODES = [];
RAW.forEach(function(r) {
  var li = r[2];
  var lane = LANES[li];
  var obj = {
    id:r[0], x:100+r[1]*210, y:lane[2]+63,
    w:NW, h:NH, label:r[3], sub:r[4],
    color:lane[3], laneName:lane[1], laneIdx:li
  };
  NODES.push(obj);
  nodeMap[r[0]] = obj;
});

var RAW_EDGES = [
  ["ob1","ob2","Tap to start"],["ob2","ob3","Begin Setup"],["ob3","ob4","Ready"],
  ["ob4","ob5","Continue"],["ob5","ob6","Continue"],["ob6","ob7","Confirm age"],
  ["ob7","ob8","Continue"],["ob7","ob9","Skip prefs"],["ob8","ob9","Continue"],
  ["ob9","ob10","Accept & Continue"],["ob10","ob11","auto scan"],
  ["ob11","ob12","Station found"],["ob12","ob13","Tap to pair"],
  ["ob13","ob14","Connected"],["ob14","ob15","Continue"],
  ["ob15","ob16","Set Up Now"],["ob15","ob19","Skip for Later"],
  ["ob16","ob17","Select slot"],["ob17","ob18","Confirm assign"],
  ["ob18","ob16","Add more slot"],["ob18","ob19","Done"],
  ["ob19","ob20","Continue"],["ob20","nav1","Enter app"],
  ["ble1","ble2","Device found"],["ble2","ble3","Tap to pair"],
  ["ble3","ble4","Paired ok"],["ble4","ble5","Link drops"],
  ["ble5","ble6","Reconnect"],["ble5","ble8","Troubleshoot"],
  ["ble5","ble1","Scan again"],["ble6","ble7","Recovered"],
  ["ble6","ble5","Failed"],["ble7","nav1","Continue to app"],
  ["ble8","ble1","Restart scan"],
  ["nav1","nav2","Discover tab"],["nav1","nav6","My Bar tab"],
  ["nav1","bb2","BarBot tab"],["nav1","rec4","Tap recipe card"],
  ["nav1","sm2","Tap station widget"],["nav1","nav9","Tap avatar"],
  ["nav2","nav3","Tap search bar"],["nav2","nav4","See all trending"],
  ["nav2","nav5","Tap category"],["nav2","rec4","Tap recipe"],
  ["nav3","rec4","Select result"],["nav4","rec4","Tap recipe"],
  ["nav5","rec4","Tap recipe"],["nav6","nav7","Tap station"],
  ["nav6","nav8","View history"],["nav6","rec4","Tap saved recipe"],
  ["nav7","sm1","Station settings"],["nav8","rec4","Tap past drink"],
  ["rec1","rec2","Browse & Search"],["rec1","rec4","Recipe Detail"],
  ["rec1","rec6","Customize direct"],["rec1","rec7","Craft direct"],
  ["rec2","rec4","Tap recipe"],["rec3","rec4","Select result"],
  ["rec4","rec5","Check Ingredients"],["rec4","rec6","Craft Now"],
  ["rec5","rec6","All ingredients OK"],["rec5","re2","Missing ingredient"],
  ["rec6","rec7","Craft This Drink"],["rec7","rec8","Confirm pour"],
  ["rec7","re1","Station error"],["rec8","rec9","Pour complete"],
  ["rec8","re5","Interrupted"],["rec9","rec10","Continue"],
  ["rec10","rec11","Continue"],["rec11","nav1","Return home"],
  ["rec11","rec2","Browse more"],
  ["bb1","bb2","Begin"],["bb2","bb3","Send message"],
  ["bb2","bb5","Voice input"],["bb2","bb6","Camera scan"],
  ["bb3","bb4","Response done"],["bb4","rec7","Craft it"],
  ["bb4","bb3","Show me more"],["bb5","bb2","Cancel"],
  ["bb6","bb2","Add to stations"],["bb7","bb2","Clean confirmed"],
  ["bb8","bb2","Make Another"],["bb8","nav1","Return home"],
  ["sm1","sm2","Station Overview"],["sm1","sm3","Level Monitor"],
  ["sm1","sm6","Quick Flush"],["sm1","sm7","Bottle Mgmt"],
  ["sm1","sm9","Maintenance"],["sm2","sm7","Tap slot"],
  ["sm2","sm3","Level view"],["sm3","sm4","Tap low slot"],
  ["sm3","sm5","Tap critical slot"],["sm3","sm7","Tap healthy slot"],

  ["ae1","ae2","Wrong password"],["ae1","ae5","Offline"],
  ["ae1","ae9","Emergency stop"],["ae2","ae3","Forgot password"],

  ["ae5","ae6","Auto retry"],["ae6","ae8","Recovered"],
  ["ae6","ae7","Failed"],["ae7","ae6","Retry manually"],
  ["ae8","nav1","Return home"],["ae9","ae10","Reconnect"],
  ["ae10","ae11","Connected"],["ae11","nav1","Resume app"],
  ["re1","re2","Missing ingredient"],["re1","re3","Disconnected"],
  ["re1","re4","Clean required"],["re1","re5","Pour interrupted"],

var EDGES = [];
RAW_EDGES.forEach(function(r) {
  var a = nodeMap[r[0]], b = nodeMap[r[1]];
  if (a && b) EDGES.push({ from:a, to:b, label:r[2] });
});

var maxX = 0, maxY = 0;
NODES.forEach(function(n) {
  maxX = Math.max(maxX, n.x + n.w);
  maxY = Math.max(maxY, n.y + n.h);
});
var CW = maxX + 120, CH = maxY + 120;

var pl = document.getElementById("pl");
var sv = document.getElementById("sv");
pl.style.width = CW + "px";
pl.style.height = CH + "px";
sv.setAttribute("width", CW);
sv.setAttribute("height", CH);
sv.setAttribute("viewBox", "0 0 " + CW + " " + CH);

function h2r(hex) {
  return parseInt(hex.slice(1,3),16)+","+parseInt(hex.slice(3,5),16)+","+parseInt(hex.slice(5,7),16);
}

LANES.forEach(function(lane) {
  var band = document.createElement("div");
  band.className = "lane-band";
  band.style.top = lane[2] + "px";
  band.style.background = "rgba("+h2r(lane[3])+","+lane[4]+")";
  band.style.borderTop = "1px solid rgba("+h2r(lane[3])+",0.13)";
  pl.appendChild(band);
  var lbl = document.createElement("div");
  lbl.className = "lane-label";
  lbl.style.top = (lane[2]+10) + "px";
  lbl.innerHTML = '<div class="ll-dot" style="background:'+lane[3]+'"></div><div class="ll-text" style="color:'+lane[3]+'">'+lane[1]+'</div>';

  document.getElementById("legend").innerHTML += '<div class="leg-row"><div class="leg-dot" style="background:'+lane[3]+'"></div>'+lane[1]+'</div>';

mkr.setAttribute("refX","7"); mkr.setAttribute("refY","4");
mkr.setAttribute("markerWidth","5"); mkr.setAttribute("markerHeight","5");
mkr.setAttribute("orient","auto");
var ap = document.createElementNS("http://www.w3.org/2000/svg","path");
ap.setAttribute("d","M0,0 L8,4 L0,8 z");
ap.setAttribute("fill","rgba(255,255,255,0.45)");
mkr.appendChild(ap); defs.appendChild(mkr); sv.appendChild(defs);

EDGES.forEach(function(e) {
  var a = e.from, b = e.to;
  var ax, ay, bx, by, cx1, cy1, cx2, cy2;
  var same = (a.laneIdx === b.laneIdx);

  if (a.id === b.id) {
    var lx = a.x + a.w/2;
    var p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d","M"+(lx-18)+","+a.y+" C"+(lx-28)+","+(a.y-42)+" "+(lx+28)+","+(a.y-42)+" "+(lx+18)+","+a.y);

    p.setAttribute("stroke","rgba("+h2r(a.color)+",0.5)");
    p.setAttribute("marker-end","url(#ah)");
    sv.appendChild(p);
    return;
  }

  if (same) {
    if (b.x > a.x) {
      ax = a.x+a.w; ay = a.y+a.h/2;
      bx = b.x; by = b.y+b.h/2;
      var gap = bx-ax;
      cx1 = ax+gap*0.45; cy1 = ay;
      cx2 = bx-gap*0.45; cy2 = by;
    } else {
      ax = a.x+a.w/2; ay = a.y;
      bx = b.x+b.w/2; by = b.y;
      cx1 = ax; cy1 = ay-55;
      cx2 = bx; cy2 = by-55;
    }
  } else {
    if (b.y > a.y) {
      ax = a.x+a.w*0.5; ay = a.y+a.h;
      bx = b.x+b.w*0.5; by = b.y;
    } else {
      ax = a.x+a.w*0.5; ay = a.y;
      bx = b.x+b.w*0.5; by = b.y+b.h;
    }
    var my = (ay+by)/2;
    cx1 = ax; cy1 = my;
    cx2 = bx; cy2 = my;
  }

  var p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d","M"+ax+","+ay+" C"+cx1+","+cy1+" "+cx2+","+cy2+" "+bx+","+by);
  p.setAttribute("class","e-path");
  p.setAttribute("stroke","rgba("+h2r(a.color)+",0.55)");
  p.setAttribute("marker-end","url(#ah)");
  sv.appendChild(p);

  if (e.label) {
    var mx = ax/8+cx1*3/8+cx2*3/8+bx/8;
    var myt = ay/8+cy1*3/8+cy2*3/8+by/8;
    var t = document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x", mx); t.setAttribute("y", myt-4);
    t.setAttribute("class","e-label"); t.setAttribute("text-anchor","middle");
    t.textContent = e.label;
    sv.appendChild(t);
  }
});

NODES.forEach(function(n) {
  var div = document.createElement("div");
  div.className = "node";
  div.style.left = n.x+"px"; div.style.top = n.y+"px";
  div.style.width = n.w+"px"; div.style.height = n.h+"px";
  div.style.background = "rgba("+h2r(n.color)+",0.09)";
  div.style.borderColor = "rgba("+h2r(n.color)+",0.32)";
  div.innerHTML = '<div class="node-label" style="color:'+n.color+'">'+n.label+'</div><div class="node-sub">'+n.sub+'</div>';
  div.addEventListener("click", function() { openPanel(n); });
  pl.appendChild(div);
});

function openPanel(n) {
  document.getElementById("dp-lane").textContent = n.laneName;
  document.getElementById("dp-lane").style.color = n.color;
  document.getElementById("dp-title").innerHTML = "<strong>"+n.label+"</strong>";
  document.getElementById("dp-sub").textContent = n.sub;
  var outDiv = document.getElementById("dp-out");
  var inDiv = document.getElementById("dp-in");
  outDiv.innerHTML = ""; inDiv.innerHTML = "";
  EDGES.forEach(function(e) {
    if (e.from.id === n.id) {
      outDiv.innerHTML += '<div class="dp-row"><span class="arr" style="color:'+n.color+'">&#8594;</span><span>'+e.to.label+'<span class="lbl"> &middot; '+e.label+'</span></span></div>';
    }
    if (e.to.id === n.id) {
      inDiv.innerHTML += '<div class="dp-row"><span class="arr" style="color:'+e.from.color+'">&#8592;</span><span>'+e.from.label+'<span class="lbl"> &middot; '+e.label+'</span></span></div>';
    }
  });
  document.getElementById("dp").classList.add("open");
}
function closePanel() { document.getElementById("dp").classList.remove("open"); }

var scale = 1, panX = 0, panY = 0;
var dragging = false, lx = 0, ly = 0;
var vp = document.getElementById("vp");

function applyT(anim) {
  pl.style.transition = anim ? "transform .3s cubic-bezier(.4,0,.2,1)" : "none";
  pl.style.transform = "translate("+panX+"px,"+panY+"px) scale("+scale+")";
}
function fitToScreen(anim) {
  var vw = vp.clientWidth || window.innerWidth;
  var vh = vp.clientHeight || (window.innerHeight - 52);
  var pad = 40;
  var sx = (vw - pad*2) / CW;
  var sy = (vh - pad*2) / CH;
  scale = Math.min(sx, sy, 1.0);
  if (scale <= 0) scale = 0.2;
  panX = (vw - CW*scale) / 2;
  panY = (vh - CH*scale) / 2;
  applyT(anim == null ? true : anim);
}
function changeScale(d) {
  scale = Math.max(0.1, Math.min(3, scale + d));
  applyT(true);
}

vp.addEventListener("wheel", function(e) {
  e.preventDefault();
  var d = e.deltaY > 0 ? -0.07 : 0.07;
  var rect = vp.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var ns = Math.max(0.1, Math.min(3, scale + d));
  panX = mx - (mx - panX) * (ns / scale);
  panY = my - (my - panY) * (ns / scale);
  scale = ns;
  applyT(false);
}, { passive: false });

vp.addEventListener("mousedown", function(e) {
  if (e.button !== 0) return;
  dragging = true; lx = e.clientX; ly = e.clientY;
  vp.classList.add("dragging");
});
window.addEventListener("mousemove", function(e) {
  if (!dragging) return;
  panX += e.clientX - lx; panY += e.clientY - ly;
  lx = e.clientX; ly = e.clientY;
  applyT(false);
});
window.addEventListener("mouseup", function() { dragging = false; vp.classList.remove("dragging"); });

vp.addEventListener("touchstart", function(e) {
  if (e.touches.length === 1) { lx = e.touches[0].clientX; ly = e.touches[0].clientY; }
}, { passive: true });
vp.addEventListener("touchmove", function(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    panX += e.touches[0].clientX - lx;
    panY += e.touches[0].clientY - ly;
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    applyT(false);
  }
}, { passive: false });

document.addEventListener("keydown", function(e) {
  if (e.key === "0" || e.key === "Escape") fitToScreen(true);
  if (e.key === "+" || e.key === "=") changeScale(0.12);
  if (e.key === "-") changeScale(-0.12);
  if (e.key === "ArrowLeft")  { panX += 60; applyT(false); }
  if (e.key === "ArrowRight") { panX -= 60; applyT(false); }
  if (e.key === "ArrowUp")    { panY += 60; applyT(false); }
  if (e.key === "ArrowDown")  { panY -= 60; applyT(false); }
});

window.addEventListener("load", function() { fitToScreen(false); });
if (document.readyState === "complete") { fitToScreen(false); }
</script>
</body>
</html>
