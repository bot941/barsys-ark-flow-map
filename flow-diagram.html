<html lang="en">

<meta charset="UTF-8">

<title>Barsys ARK — Complete User Flow Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e0e0e0;font-family:'SF Pro Display','Segoe UI',sans-serif;overflow:hidden;height:100vh}
#toolbar{position:fixed;top:0;left:0;right:0;height:52px;background:rgba(10,10,20,0.96);border-bottom:1px solid #222;display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;backdrop-filter:blur(10px)}
#toolbar h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.5px;margin-right:8px}
#toolbar span{font-size:12px;color:#666}
.tbtn{background:rgba(255,255,255,0.07);border:1px solid #333;color:#ccc;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.tbtn:hover{background:rgba(255,255,255,0.13);color:#fff}
#nodecount{margin-left:auto;font-size:11px;color:#555}
#canvas-wrap{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
.node-rect{rx:8;cursor:pointer}
.node-label{font-size:11px;font-weight:600;fill:#fff;pointer-events:none;dominant-baseline:middle;text-anchor:middle}
.node-sub{font-size:9px;fill:rgba(255,255,255,0.5);pointer-events:none;dominant-baseline:middle;text-anchor:middle}
.edge-path{fill:none;stroke-width:1.8;opacity:0.65}
.edge-label{font-size:9px;fill:#888;pointer-events:none;text-anchor:middle}
#detail{position:fixed;top:52px;right:-340px;width:320px;bottom:0;background:rgba(15,15,25,0.97);border-left:1px solid #2a2a3a;padding:20px;transition:right .25s cubic-bezier(.4,0,.2,1);z-index:200;overflow-y:auto}
#detail.open{right:0}
#detail h3{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
#detail .dtag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-bottom:12px;opacity:.85}
#detail .dsub{font-size:12px;color:#aaa;margin-bottom:14px;line-height:1.6}
#detail .dsec{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;margin-top:14px}
#detail .dlink{display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 8px;border-radius:5px;background:rgba(255,255,255,0.04);margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s}
#detail .dlink:hover{background:rgba(255,255,255,0.09);border-color:#333}
#detail .dlink .arr{font-size:9px;color:#555}
#detail .dlink .lbl{color:#ddd}
#detail #dclose{position:absolute;top:16px;right:16px;background:none;border:none;color:#666;font-size:18px;cursor:pointer;padding:4px}
#detail #dclose:hover{color:#fff}
#legend{position:fixed;bottom:16px;left:16px;background:rgba(10,10,20,0.92);border:1px solid #222;border-radius:10px;padding:12px 14px;z-index:100;backdrop-filter:blur(8px)}
#legend h4{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.leg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.leg-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.leg-label{font-size:10px;color:#888}
#hint{position:fixed;bottom:16px;right:16px;font-size:10px;color:#444;text-align:right;line-height:1.8}
</style>
</head>
<body>
<div id="toolbar">
  <h1>Barsys ARK — Complete User Flow Map</h1>
  <span>All screens · all branches · all error states</span>

  <button class="tbtn" id="toggleLabels" onclick="toggleEdgeLabels()">Hide Labels</button>
  <span id="zoomlbl" style="font-size:11px;color:#555">100%</span>
  <span id="nodecount"></span>
</div>
<div id="canvas-wrap">

</div>
<div id="detail">

  <p id="d-sub" class="dsub"></p>
  <div class="dsec">Leads to</div>
  <div id="d-out"></div>
  <div class="dsec">Reached from</div>
  <div id="d-in"></div>
</div>
<div id="legend">
  <h4>Swim Lanes</h4>
  <div id="leg-rows"></div>
</div>
<div id="hint">Scroll to zoom &nbsp;|&nbsp; Drag to pan &nbsp;|&nbsp; Click node for details<br>Arrow keys to pan &nbsp;|&nbsp; +/- to zoom &nbsp;|&nbsp; 0 to fit</div>

// Build node objects
var NODES = [];
var nodeMap = {};
NODE_DEFS.forEach(function(d) {
  var id=d[0], x=d[1], lKey=d[2], isMain=d[3], label=d[4], sub=d[5];
  var w = isMain ? NW : BW;
  var h = isMain ? NH : BH;
  var y = isMain ? mainY(lKey) : branchY(lKey);
  var lane = laneMap[lKey];
  var n = {id:id, x:x, y:y, w:w, h:h, label:label, sub:sub, laneKey:lKey, laneName:lane[1], isMain:isMain, color:lane[4]};
  NODES.push(n);
  nodeMap[id] = n;
});

var showLabels = true;

function hexToRgb(hex) {
  return parseInt(hex.slice(1,3),16)+","+parseInt(hex.slice(3,5),16)+","+parseInt(hex.slice(5,7),16);
}

function svgEl(tag, attrs) {
  var el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  if (attrs) {
    Object.keys(attrs).forEach(function(k){ el.setAttribute(k, attrs[k]); });
  }
  return el;
}

function wrapText(label) {
  var words = label.split(" ");
  if (words.length <= 2) return [label, ""];
  var mid = Math.ceil(words.length / 2);
  return [words.slice(0, mid).join(" "), words.slice(mid).join(" ")];
}

function buildSVG() {
  var svg = document.getElementById("canvas");
  svg.setAttribute("width", CW);
  svg.setAttribute("height", CH);
  svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");

  // Defs: arrowhead
  var defs = svgEl("defs");
  var mk = svgEl("marker", {id:"ah", markerWidth:"7", markerHeight:"6", refX:"6", refY:"3", orient:"auto"});
  var poly = svgEl("polygon", {points:"0 0, 7 3, 0 6", fill:"rgba(180,180,200,0.65)"});
  mk.appendChild(poly);
  defs.appendChild(mk);
  svg.appendChild(defs);

  var g = svgEl("g", {id:"main-g"});
  svg.appendChild(g);

  // Lane backgrounds
  LANES.forEach(function(lane) {
    var rgb = hexToRgb(lane[4]);
    var bg = svgEl("rect", {x:18, y:lane[2], width:CW-36, height:lane[3],
      fill:"rgba("+rgb+",0.06)", stroke:"rgba("+rgb+",0.22)", "stroke-width":"1", rx:"10"});
    g.appendChild(bg);
    var lt = svgEl("text", {x:32, y:lane[2]+18, fill:"rgba("+rgb+",0.65)",
      "font-size":"10", "font-weight":"700", "font-family":"SF Pro Display,Segoe UI,sans-serif",
      "letter-spacing":"1"});
    lt.textContent = lane[1].toUpperCase();
    g.appendChild(lt);
  });

  // Edges
  EDGES.forEach(function(e) {
    var a = nodeMap[e[0]], b = nodeMap[e[1]];
    if (!a || !b) return;
    var ax, ay, bx, by, cx1, cy1, cx2, cy2;
    var sameLane = (a.laneKey === b.laneKey);
    var sameRow = (Math.abs(a.y - b.y) < 25);

    if (sameLane && sameRow && b.x > a.x) {
      // Forward same row
      ax = a.x + a.w; ay = a.y + a.h/2;
      bx = b.x; by = b.y + b.h/2;
      var gap = b.x - (a.x + a.w);
      cx1 = ax + gap*0.4; cy1 = ay;
      cx2 = bx - gap*0.4; cy2 = by;
    } else if (sameLane && sameRow && b.x <= a.x) {
      // Backward same row: arc above
      ax = a.x + a.w/2; ay = a.y;
      bx = b.x + b.w/2; by = b.y;
      cx1 = ax; cy1 = ay - 48;
      cx2 = bx; cy2 = by - 48;
    } else if (sameLane && !sameRow) {
      // Cross-row same lane (main <-> branch)
      if (b.y > a.y) {
        ax = a.x + a.w*0.5; ay = a.y + a.h;
        bx = b.x + b.w*0.5; by = b.y;
      } else {
        ax = a.x + a.w*0.5; ay = a.y;
        bx = b.x + b.w*0.5; by = b.y + b.h;
      }
      var midY = (ay + by) / 2;
      cx1 = ax; cy1 = midY;
      cx2 = bx; cy2 = midY;
    } else {
      // Cross-lane S-curve
      if (b.y > a.y) {
        ax = a.x + a.w*0.5; ay = a.y + a.h;
        bx = b.x + b.w*0.5; by = b.y;
      } else {
        ax = a.x + a.w*0.5; ay = a.y;
        bx = b.x + b.w*0.5; by = b.y + b.h;
      }
      var mid = (ay + by) / 2;
      cx1 = ax; cy1 = mid;
      cx2 = bx; cy2 = mid;
    }

    var rgb = hexToRgb(a.color);
    var path = svgEl("path", {
      class: "edge-path",
      d: "M "+ax+","+ay+" C "+cx1+","+cy1+" "+cx2+","+cy2+" "+bx+","+by,
      stroke: "rgba("+rgb+",0.48)",
      "marker-end": "url(#ah)"
    });
    g.appendChild(path);

    if (e[2] && showLabels) {
      var lx = (ax+bx)/2, ly = (ay+by)/2 - 5;
      var lt2 = svgEl("text", {x:lx, y:ly, class:"edge-label",
        "font-family":"SF Pro Display,Segoe UI,sans-serif", "data-elabel":"1"});
      lt2.textContent = e[2];
      g.appendChild(lt2);
    }
  });

  // Nodes
  NODES.forEach(function(n) {
    var rgb = hexToRgb(n.color);
    var grp = svgEl("g", {cursor:"pointer"});
    grp.setAttribute("data-nid", n.id);

    var rect = svgEl("rect", {
      x: n.x, y: n.y, width: n.w, height: n.h,
      fill: n.isMain ? "rgba("+rgb+",0.4)" : "rgba("+rgb+",0.15)",
      stroke: n.isMain ? "rgba("+rgb+",0.85)" : "rgba("+rgb+",0.42)",
      "stroke-width": n.isMain ? "1.5" : "1",
      rx: "8",
      class: "node-rect"
    });
    grp.appendChild(rect);

    var cx = n.x + n.w/2;
    var cy = n.y + n.h/2;
    var lines = wrapText(n.label);

    if (lines[1]) {
      var t1 = svgEl("text", {x:cx, y:cy-9, class:"node-label", "font-family":"SF Pro Display,Segoe UI,sans-serif"});
      t1.textContent = lines[0];
      grp.appendChild(t1);
      var t2 = svgEl("text", {x:cx, y:cy+6, class:"node-label", "font-family":"SF Pro Display,Segoe UI,sans-serif"});
      t2.textContent = lines[1];
      grp.appendChild(t2);
    } else {
      var t1s = svgEl("text", {x:cx, y:cy-2, class:"node-label", "font-family":"SF Pro Display,Segoe UI,sans-serif"});
      t1s.textContent = lines[0];
      grp.appendChild(t1s);
    }

    if (n.isMain && n.sub) {
      var subWords = n.sub.split(" ");
      var subLine = subWords.slice(0, 5).join(" ") + (subWords.length > 5 ? "..." : "");
      var st = svgEl("text", {x:cx, y:cy+22, class:"node-sub", "font-family":"SF Pro Display,Segoe UI,sans-serif"});
      st.textContent = subLine;
      grp.appendChild(st);
    }

    grp.addEventListener("click", function(){ showDetail(n.id); });
    g.appendChild(grp);
  });

  document.getElementById("nodecount").textContent = NODES.length + " nodes  |  " + EDGES.length + " connections";
}

function showDetail(id) {
  var n = nodeMap[id];
  if (!n) return;
  var rgb = hexToRgb(n.color);
  document.getElementById("d-title").textContent = n.label;
  var tag = document.getElementById("d-tag");
  tag.textContent = n.laneName;
  tag.style.background = "rgba("+rgb+",0.22)";
  tag.style.color = n.color;
  document.getElementById("d-sub").textContent = n.sub;
  var outEl = document.getElementById("d-out");
  var inEl = document.getElementById("d-in");
  outEl.innerHTML = "";
  inEl.innerHTML = "";
  EDGES.forEach(function(e) {
    if (e[0] === id) {
      var tgt = nodeMap[e[1]];
      if (!tgt) return;
      var d = document.createElement("div");
      d.className = "dlink";
      d.innerHTML = "<span class='arr'>&#x2192;</span><span class='lbl'>"+tgt.label+"</span><span style='margin-left:auto;font-size:10px;color:#555'>"+e[2]+"</span>";
      d.onclick = function(){ showDetail(e[1]); };
      outEl.appendChild(d);
    }
    if (e[1] === id) {
      var src = nodeMap[e[0]];
      if (!src) return;
      var d2 = document.createElement("div");
      d2.className = "dlink";
      d2.innerHTML = "<span class='arr'>&#x2190;</span><span class='lbl'>"+src.label+"</span><span style='margin-left:auto;font-size:10px;color:#555'>"+e[2]+"</span>";
      d2.onclick = function(){ showDetail(e[0]); };
      inEl.appendChild(d2);
    }
  });
  if (!outEl.children.length) outEl.innerHTML = "<div style='font-size:11px;color:#444;padding:4px 8px'>None</div>";
  if (!inEl.children.length) inEl.innerHTML = "<div style='font-size:11px;color:#444;padding:4px 8px'>None</div>";
  document.getElementById("detail").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail").classList.remove("open");
}

function buildLegend() {
  var el = document.getElementById("leg-rows");
  LANES.forEach(function(l) {
    var row = document.createElement("div");
    row.className = "leg-row";
    row.innerHTML = "<div class='leg-swatch' style='background:"+l[4]+"'></div><span class='leg-label'>"+l[1]+"</span>";
    el.appendChild(row);
  });
}

// Zoom / Pan
var scale=1, tx=0, ty=0, dragging=false, dragStartX, dragStartY, txStart, tyStart;

function applyTransform() {
  var g = document.getElementById("main-g");
  if (g) g.setAttribute("transform","translate("+tx+","+ty+") scale("+scale+")");
  document.getElementById("zoomlbl").textContent = Math.round(scale*100)+"%";
}

function fitToScreen() {
  var w = document.getElementById("canvas-wrap");
  var vw = w.offsetWidth, vh = w.offsetHeight;
  scale = Math.min((vw-40)/CW, (vh-40)/CH);
  tx = (vw - CW*scale) / 2;
  ty = 20;
  applyTransform();
}

function resetZoom() {
  scale=1; tx=40; ty=20; applyTransform();
}

function toggleEdgeLabels() {
  showLabels = !showLabels;
  document.querySelectorAll("[data-elabel]").forEach(function(el){
    el.style.display = showLabels ? "" : "none";
  });
  document.getElementById("toggleLabels").textContent = showLabels ? "Hide Labels" : "Show Labels";
}

window.addEventListener("load", function() {
  buildSVG();
  buildLegend();
  var wrap = document.getElementById("canvas-wrap");

  wrap.addEventListener("wheel", function(e) {
    e.preventDefault();
    var r = wrap.getBoundingClientRect();
    var mx = e.clientX - r.left, my = e.clientY - r.top;
    var delta = e.deltaY > 0 ? 0.875 : 1.143;
    var ns = Math.max(0.1, Math.min(4, scale*delta));
    tx = mx - (mx - tx)*(ns/scale);
    ty = my - (my - ty)*(ns/scale);
    scale = ns;
    applyTransform();
  }, {passive:false});

  wrap.addEventListener("mousedown", function(e) {
    if (e.target.closest("[data-nid]")) return;
    dragging=true;
    dragStartX=e.clientX; dragStartY=e.clientY;
    txStart=tx; tyStart=ty;
    wrap.classList.add("dragging");
  });
  document.addEventListener("mousemove", function(e) {
    if (!dragging) return;
    tx = txStart + (e.clientX - dragStartX);
    ty = tyStart + (e.clientY - dragStartY);
    applyTransform();
  });
  document.addEventListener("mouseup", function() {
    dragging=false;
    document.getElementById("canvas-wrap").classList.remove("dragging");
  });

  var ltd=null, ltm=null;
  wrap.addEventListener("touchstart", function(e) {
    if (e.touches.length===1) {
      dragging=true;
      dragStartX=e.touches[0].clientX; dragStartY=e.touches[0].clientY;
      txStart=tx; tyStart=ty;
    } else if (e.touches.length===2) {
      dragging=false;
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      ltd=Math.sqrt(dx*dx+dy*dy);
      ltm={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
  },{passive:true});
  wrap.addEventListener("touchmove", function(e) {
    e.preventDefault();
    if (e.touches.length===1 && dragging) {
      tx=txStart+(e.touches[0].clientX-dragStartX);
      ty=tyStart+(e.touches[0].clientY-dragStartY);
      applyTransform();
    } else if (e.touches.length===2 && ltd) {
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var d2=dist/ltd;
      var mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
      var ns=Math.max(0.1,Math.min(4,scale*d2));
      tx=mid.x-(ltm.x-tx)*(ns/scale);
      ty=mid.y-(ltm.y-ty)*(ns/scale);
      scale=ns; ltd=dist; ltm=mid;
      applyTransform();
    }
  },{passive:false});
  wrap.addEventListener("touchend", function(){ dragging=false; ltd=null; });

  document.addEventListener("keydown", function(e) {
    var s=40;
    if(e.key==="ArrowLeft"){tx+=s;applyTransform();}
    if(e.key==="ArrowRight"){tx-=s;applyTransform();}
    if(e.key==="ArrowUp"){ty+=s;applyTransform();}
    if(e.key==="ArrowDown"){ty-=s;applyTransform();}
    if(e.key==="+"||e.key==="="){scale=Math.min(4,scale*1.15);applyTransform();}
    if(e.key==="-"){scale=Math.max(0.1,scale*0.87);applyTransform();}
    if(e.key==="0"){fitToScreen();}
    if(e.key==="Escape"){closeDetail();}
  });

  setTimeout(fitToScreen, 100);
});
</script>
